# Single-file Docker Compose for the full Valhalla DACH-cycling
# tile bake. Two services chained:
#
#   1. valhalla      — auto-downloads PBFs from Geofabrik, runs
#                      valhalla_build_tiles, exits cleanly. Uses
#                      ghcr.io/valhalla/valhalla:run-latest (public).
#
#   2. packager      — Python container that runs AFTER valhalla
#                      exits successfully. Clones the bake-repo,
#                      installs it, runs `bake.run_valhalla
#                      --no-build` to tar+gzip the tile output,
#                      compute SHA-256, write manifest.json, and
#                      upload both to R2. Reads R2 creds from .env.
#
# # Setup (one-time on the server)
#
#   1. Copy this file + a `.env` into an empty directory.
#   2. The `.env` needs the five R2_* variables — see `.env.example`
#      in the bake-repo, or fill it from your existing Windows .env.
#
# # Run
#
#   docker compose -f docker-compose.valhalla.yaml up -d
#   docker compose -f docker-compose.valhalla.yaml logs -f
#
# Wall time: ~45–90 min depending on hardware + uplink. Watch the
# packager logs near the end — last line should be
# "[run_valhalla] done." with the bundle + manifest URLs.
#
# # Re-runs
#
# After a successful run, the output stays in ./data/. To re-bake
# (e.g. fresher OSM extracts, bumped bundle version):
#
#   1. `rm -rf ./data`             # nuke previous output
#   2. Edit BUNDLE_VERSION below   # bump from 1 to 2 etc.
#   3. `docker compose -f docker-compose.valhalla.yaml up -d`
#
# # Output paths
#
# On the host after success:
#   ./data/valhalla_tiles/                       per-level .gph files (~2.5 GB)
#   ./data/valhalla.json                         routing config
#   ./data/tiled/v1/valhalla/dach/tiles-v1.tar.gz  packaged bundle
#   ./data/tiled/v1/valhalla/dach/manifest.json    bundle metadata
#
# On R2 after success:
#   v1/valhalla/dach/tiles-v1.tar.gz             the bundle
#   v1/valhalla/dach/manifest.json               the manifest
#
# iOS `ValhallaTileStore` fetches the manifest first, compares
# `bundleVersion`, and downloads the bundle if newer than installed.
#
# # Memory + disk
#
# Peak ~12–16 GB RAM during the hierarchy-build stage of valhalla.
# 4-GB hosts will OOM; 8+ GB recommended; 16+ GB ideal. Disk needs
# ~15 GB free (PBFs ~5 GB + tiles ~2.5 GB + tar ~1.5 GB + slack).

services:
  valhalla:
    image: ghcr.io/valhalla/valhalla:run-latest
    container_name: valhalla-bake
    volumes:
      - ./data:/custom_files
    environment:
      tile_urls: "https://download.geofabrik.de/europe/germany-latest.osm.pbf,https://download.geofabrik.de/europe/austria-latest.osm.pbf,https://download.geofabrik.de/europe/switzerland-latest.osm.pbf"
      # Number of worker threads. Set to your server's physical
      # core count for fastest build; the late hierarchy-build
      # stage is mostly single-threaded so don't over-spec.
      server_threads: "4"
      # Skip per-edge elevation data — adds ~1 h + several GB and
      # the iOS matcher doesn't need it for snap-to-road.
      build_elevation: "False"
      build_admins: "True"
      build_time_zones: "True"
      # Use existing tiles if present (idempotent re-runs).
      force_rebuild: "False"
      force_rebuild_elevation: "False"
      use_tiles_ignore_pbf: "False"
      # CRITICAL: tells run.sh to exit after build instead of
      # staying up as a routing server. Without this the container
      # never reaches `service_completed_successfully` and the
      # packager step never starts.
      serve_tiles: "False"
    restart: "no"

  packager:
    image: python:3.12-slim
    container_name: valhalla-packager
    depends_on:
      valhalla:
        # Compose v2.2+: only start packager AFTER valhalla exits
        # with code 0. If valhalla fails, packager is skipped.
        condition: service_completed_successfully
    volumes:
      - ./data:/work
    env_file:
      - .env
    working_dir: /app
    # The packager needs git (to clone the bake-repo) + the Python
    # deps. Both installed at container start — adds ~30 s to the
    # total runtime, but keeps the compose self-contained (no
    # Dockerfile, no pre-built image to maintain).
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        echo "[packager] installing tooling..."
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends git ca-certificates
        echo "[packager] cloning bake-repo..."
        git clone --depth=1 \
          https://github.com/boerne-lab/mapbiker-tile-bake.git /app
        cd /app
        echo "[packager] installing python deps..."
        pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir -e .
        echo "[packager] running package + upload step..."
        python -m bake.run_valhalla \
          --region dach \
          --bundle-version 1 \
          --no-build \
          --work-dir /work
        echo "[packager] done."
    restart: "no"
